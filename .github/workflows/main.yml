name: Scorpion Remote Engine
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # هيجيب أحدث نسخة مستقرة 2026

      - name: Reconstruct Project
        run: |
          flutter create . --project-name mirror_scorpion2 --org com.adham.mirror
          # رفع الـ SDK عشان يتوافق مع أحدث نسخة
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' android/app/build.gradle
          flutter pub upgrade # تحديث المكتبات لأقصى توافق

      - name: Build Secure APK
        run: flutter build apk --debug
          
      - name: Export Scorpion APK
        uses: actions/upload-artifact@v4
        with:
          name: Mirror-Scorpion2-Final
          path: build/app/outputs/flutter-apk/app-debug.apk
