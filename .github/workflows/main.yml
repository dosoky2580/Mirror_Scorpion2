name: Scorpion Remote Engine
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Absolute Project Rebuild
        run: |
          # مسح أي ملفات قديمة قد تسبب تعارض
          rm -rf android build .dart_tool
          
          # إعادة إنشاء المشروع من الصفر
          flutter create . --project-name mirror_scorpion2 --org com.adham.mirror
          
          # تعديل إعدادات الأندرويد للنسخة الجديدة (kts)
          sed -i 's/compileSdk = .*/compileSdk = 34/g' android/app/build.gradle.kts
          
          # جلب المكتبات بأحدث نسخ متوافقة
          flutter pub upgrade --major-versions
          
      - name: Build Secure APK
        run: flutter build apk --debug
          
      - name: Export Scorpion APK
        uses: actions/upload-artifact@v4
        with:
          name: Mirror-Scorpion2-Final
          path: build/app/outputs/flutter-apk/app-debug.apk
