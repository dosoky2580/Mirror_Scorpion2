name: Scorpion Remote Engine
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Absolute Project Rebuild
        run: |
          rm -rf android build .dart_tool
          flutter create . --project-name mirror_scorpion2 --org com.adham.mirror
          
          # رفع الـ SDK لنسخة 36 وتفعيل دعم مكتبات جافا القديمة (Desugaring)
          sed -i 's/compileSdk = .*/compileSdk = 36/g' android/app/build.gradle.kts
          sed -i 's/minSdk = .*/minSdk = 24/g' android/app/build.gradle.kts
          
          # إضافة مكتبة الدعم المطلوبة للإشعارات
          sed -i '/dependencies {/a \    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")' android/app/build.gradle.kts
          
          flutter pub get
          
      - name: Build Secure APK
        run: flutter build apk --debug
          
      - name: Export Scorpion APK
        uses: actions/upload-artifact@v4
        with:
          name: Mirror-Scorpion2-Final
          path: build/app/outputs/flutter-apk/app-debug.apk
