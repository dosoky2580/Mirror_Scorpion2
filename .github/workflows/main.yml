name: Scorpion Remote Engine
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Clean Build
        run: |
          # مسح الكاش والملفات القديمة تماماً
          rm -rf android build .dart_tool pubspec.lock
          
          # تعديل ملف pubspec.yaml يدوياً للتأكد من الإصدار المستقر
          sed -i 's/flutter_local_notifications: .*/flutter_local_notifications: 16.1.0/g' pubspec.yaml
          
          # إعادة إنشاء ملفات الأندرويد
          flutter create . --project-name mirror_scorpion2 --org com.adham.mirror
          
          # إعادة كتابة الإعدادات الصحيحة (SDK 36 & NDK 28)
          cat << 'INNER_EOF' > android/app/build.gradle.kts
          plugins {
              id("com.android.application")
              id("kotlin-android")
              id("dev.flutter.flutter-gradle-plugin")
          }

          android {
              namespace = "com.adham.mirror.mirror_scorpion2"
              compileSdk = 36
              ndkVersion = "28.2.13676358"

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_1_8
                  targetCompatibility = JavaVersion.VERSION_1_8
                  isCoreLibraryDesugaringEnabled = true
              }

              kotlinOptions {
                  jvmTarget = "1.8"
              }

              defaultConfig {
                  applicationId = "com.adham.mirror.mirror_scorpion2"
                  minSdk = 24
                  targetSdk = 36
                  versionCode = 1
                  versionName = "1.0"
              }
          }

          dependencies {
              coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")
          }
          INNER_EOF
          
          flutter pub get
          
      - name: Build Secure APK
        run: flutter build apk --debug
          
      - name: Export Scorpion APK
        uses: actions/upload-artifact@v4
        with:
          name: Mirror-Scorpion2-Final
          path: build/app/outputs/flutter-apk/app-debug.apk
